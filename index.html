<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  // === SETTING: URL Web App Google Apps Script ===
  const APPS_SCRIPT_URL = 'PASTE_WEB_APP_URL_DI_SINI';

  // IMAGE PREVIEW
  const gambarInput = document.getElementById('gambar');
  const preview = document.getElementById('preview');
  let imageData = null;

  gambarInput.addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(event){
      imageData = event.target.result;
      preview.src = imageData;
      preview.style.display = 'block';
    }
    reader.readAsDataURL(file);
  });

  // Fungsi HANTAR DATA ke Google Sheet (Apps Script)
  async function hantarKeSheet(payload) {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // paling mudah, tak pening CORS
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });
    // mode: 'no-cors' tak boleh baca response, tapi cukup untuk log ke Sheet
    return true;
  }

  // Kumpul data borang (supaya boleh guna semula di Submit & PDF)
  function getFormData() {
    const nama = document.getElementById('nama').value;
    const nopekerja = document.getElementById('nopekerja').value;
    const jawatan = document.getElementById('jawatan').value;
    const tarikh = document.getElementById('tarikh').value;
    const mod = document.getElementById('mod').value;
    const laporan = document.getElementById('laporan').value;

    return {
      nama,
      nopekerja,
      jawatan,
      tarikh,
      mod,
      laporan,
      gambarURL: imageData || ''
    };
  }

  // 1) BUTANG SUBMIT – hanya hantar ke Google Sheet
  async function submitForm() {
    const payload = getFormData();

    try {
      await hantarKeSheet(payload);
      alert('Data berjaya dihantar ke Google Sheet.');
    } catch (err) {
      console.error('Ralat hantar ke Google Sheet:', err);
      alert('Ralat semasa hantar data. Sila cuba lagi.');
    }
  }

  // 2) BUTANG DOWNLOAD PDF – hanya generate & download PDF
  function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const data = getFormData();
    const nama = data.nama;
    const nopekerja = data.nopekerja;
    const jawatan = data.jawatan;
    const tarikh = data.tarikh;
    const mod = data.mod;
    const laporan = data.laporan;

    // HEADER
    doc.setFillColor(128,0,32);
    doc.rect(0,0,210,30,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(18);
    doc.text('Laporan BDR / BDP UTM', 20, 18);

    // CONTENT
    doc.setTextColor(0,0,0);
    doc.setFontSize(12);
    let y = 45;

    function addField(label, value){
      doc.setFont(undefined, 'bold');
      doc.text(label, 20, y);
      doc.setFont(undefined, 'normal');
      doc.text(value || '-', 70, y);
      y += 10;
    }

    addField('Nama', nama);
    addField('No Pekerja', nopekerja);
    addField('Jawatan', jawatan);
    addField('Tarikh', tarikh);
    addField('Mod', mod);

    // Laporan
    y += 8;
    doc.setFont(undefined, 'bold');
    doc.text('Laporan Tugasan', 20, y);
    y += 8;
    doc.setFont(undefined, 'normal');
    const splitText = doc.splitTextToSize(laporan || '-', 170);
    doc.text(splitText, 20, y);
    y += splitText.length * 7;

    // IMAGE
    if(imageData){
      y += 10;
      doc.setFont(undefined, 'bold');
      doc.text('Lampiran Gambar', 20, y);
      y += 8;
      try{
        doc.addImage(imageData, 'JPEG', 20, y, 80, 60);
        y += 70;
      }catch(err){
        console.log(err);
      }
    }

    // SAVE
    const filename = 'Laporan_' + (nama || 'Staff') + '.pdf';
    doc.save(filename);
  }
</script>
